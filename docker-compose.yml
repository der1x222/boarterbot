version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: marketbot_postgres
    environment:
      POSTGRES_USER: marketbot
      POSTGRES_PASSWORD: marketbot
      POSTGRES_DB: marketbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: marketbot_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
